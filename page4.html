<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food in Krabi</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <style>
    :root{
      --thai1:#ff9a3c;   /* orange spice */
      --thai2:#ff4d4d;   /* chili red */
      --thai3:#fff2cc;   /* soft food tone */
      --card:rgba(255,255,255,0.9);
      --shadow:0 6px 18px rgba(0,0,0,0.12);
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(160deg,var(--thai3),var(--thai1),var(--thai2));
      color:#222;
    }

    .container{
      max-width:1100px;
      margin:30px auto;
      padding:20px;
      background:rgba(255,255,255,0.85);
      border-radius:16px;
      box-shadow:var(--shadow);
    }

    nav{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:15px;
    }

    nav a{
      text-decoration:none;
      padding:8px 12px;
      background:#fff;
      border-radius:8px;
      font-weight:bold;
      color:#a33;
    }

    h1{
      margin-bottom:20px;
    }

    /* MAIN FEATURE */
    .primary{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .main-photo{
      flex:1 1 320px;
      max-width:520px;
      border-radius:12px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .main-photo img{
      width:100%;
      transition:0.3s;
    }

    .main-photo:hover img{
      transform:scale(1.1);
    }

    .caption{
      flex:1 1 240px;
      padding:12px;
      background:var(--card);
      border-radius:10px;
    }

    /* GALLERY GRID */
    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:14px;
    }

    .photo-card{
      border-radius:12px;
      overflow:hidden;
      background:var(--card);
      box-shadow:var(--shadow);
      cursor:pointer;
    }

    .photo-card img{
      width:100%;
      height:170px;
      object-fit:cover;
      transition:0.3s;
    }

    .photo-card:hover img{
      transform:scale(1.12);
    }

    /* LIGHTBOX */
    .lightbox{
      position:fixed;
      inset:0;
      display:none;
      justify-content:center;
      align-items:center;
      background:rgba(0,0,0,0.7);
    }

    .lightbox.open{
      display:flex;
    }

    .lightbox img{
      max-width:95%;
      max-height:95%;
      border-radius:10px;
    }

    .close-btn{
      position:absolute;
      top:20px;
      right:20px;
      background:white;
      border:none;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- NAV -->
  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="page2.html">Page 2</a>
    <a href="page3.html">Page 3</a>
    <a href="page4.html">Page 4</a>
    <a href="page5.html">Page 5</a>
  </nav>

  <h1>🍜 Food in Krabi</h1>

  <!-- MAIN -->
  <section class="primary">
    <div class="main-photo">
      <img src="food1.jpg" id="featured">
    </div>

    <div class="caption" contenteditable="true">
      Delicious Thai food! 🌶️ Click to edit
    </div>
  </section>

  <!-- GALLERY -->
  <section class="gallery">

    <div class="photo-card" data-src="food1.jpg"><img src="images/Food1.jpg"></div>
    <div class="photo-card" data-src="food2.jpg"><img src="images/Food2.jpg"></div>
    <div class="photo-card" data-src="food3.jpg"><img src="images/Food3.jpg"></div>
    <div class="photo-card" data-src="food4.jpg"><img src="images/Food4.jpg"></div>
    <div class="photo-card" data-src="food5.jpg"><img src="images/Food5.jpg"></div>
    <div class="photo-card" data-src="food6.jpg"><img src="images/Food6.jpg"></div>
    <div class="photo-card" data-src="food7.jpg"><img src="images/Food7.jpg"></div>
    <div class="photo-card" data-src="food8.jpg"><img src="images/Food8.jpg"></div>

  </section>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="close-btn" onclick="closeBox()">Close ✕</button>
  <img id="lightImg">
</div>

<script>
  const cards = document.querySelectorAll('.photo-card');
  const lightbox = document.getElementById('lightbox');
  const lightImg = document.getElementById('lightImg');
  const featured = document.getElementById('featured');

  cards.forEach(card=>{
    card.addEventListener('click', ()=>{
      lightImg.src = card.dataset.src;
      lightbox.classList.add('open');
    });

    card.addEventListener('dblclick', ()=>{
      featured.src = card.dataset.src;
    });
  });

  function closeBox(){
    lightbox.classList.remove('open');
  }

  lightbox.addEventListener('click',(e)=>{
    if(e.target === lightbox) closeBox();
  });
</script>

</body>
</html>
