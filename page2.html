<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page 2</title>

  <style>
    body {
      font-family: Arial;
      background-color: #FFF9E3;
      padding: 20px;
      text-align: center;
      margin: 0;
    }

    nav a {
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
      color: black;
    }

    h1 {
      margin-top: 20px;
      font-size: 2.5em;
    }

    h2 {
      margin-top: 40px;
    }

    /* IMAGE GRID */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 15px;
      width: 220px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      overflow: hidden;
      transition: transform 0.3s;
    }

    /* CARD HOVER */
    .card:hover {
      transform: scale(1.05);
    }

    /* IMAGE ZOOM */
    .card img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.4s ease;
    }

    .card:hover img {
      transform: scale(1.2);
    }

    /* CAPTION */
    .caption {
      margin-top: 8px;
      font-size: 0.95em;
    }

    /* VIDEO SECTION */
    .video-section {
      margin-top: 40px;
    }

    .video-card {
      background: white;
      padding: 10px;
      border-radius: 15px;
      width: 350px;
      margin: 20px auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

  </style>
</head>

<body>
