<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page 2</title>

  <style>
    body {
      font-family: Arial;
      background-color: #FFF9E3;
      padding: 20px;
      text-align: center;
      margin: 0;
    }

    nav {
      margin-bottom: 20px;
    }

    nav a {
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
      color: black;
      font-size: 1.2em;
    }

    nav a:hover {
      color: orange;
    }

    h1 {
      margin-top: 20px;
      font-size: 2.5em;
    }

    h2 {
      margin-top: 50px;
    }

    /* IMAGE GRID */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 15px;
      width: 220px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      overflow: hidden;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.4s ease;
    }

    .card:hover img {
      transform: scale(1.2);
    }

    .caption {
      margin-top: 8px;
      font-size: 0.95em;
    }

    /* VIDEO SECTION */
    .video-section {
      margin-top: 60px;
    }

    .video-card {
      background: white;
      padding: 15px;
      border-radius: 15px;
      width: 350px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .video-card video {
      width: 100%;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
  <a href="index.html">Home</a>
  <a href="gallery.html">Gallery</a>
  <a href="page2.html">Page 2</a>
  <a href="page3.html">Page 3</a>
  <a href="page4.html">Page 4</a>
  <a href="page5.html">Page 5</a>
</nav>

<h1>📍 Day 1 in Krabi</h1>

<h2>📸 Photos</h2>

<div class="gallery">

  <div class="card">
    <img src="images/krabi1.jpg" alt="">
    <div class="caption">Arrival in Krabi 🌴</div>
  </div>

  <div class="card">
    <img src="images/krabi2.jpg" alt="">
    <div class="caption">Beautiful beach 🌊</div>
  </div>

  <div class="card">
    <img src="images/krabi3.jpg" alt="">
    <div class="caption">Island hopping 🚤</div>
  </div>

  <div class="card">
    <img src="images/krabi4.jpg" alt="">
    <div class="caption">Local food 🍜</div>
  </div>

  <div class="card">
    <img src="images/krabi5.jpg" alt="">
    <div class="caption">Sunset view 🌅</div>
  </div>

  <div class="card">
    <img src="images/krabi6.jpg" alt="">
    <div class="caption">Nature walk 🌿</div>
  </div>

  <div class="card">
    <img src="images/krabi7.jpg" alt="">
    <div class="caption">Night market ✨</div>
  </div>

</div>

<!-- VIDEO SECTION -->
<div class="video-section">
  <h2>🎥 Video</h2>

  <div class="video-card">
    <video controls>
      <source src="videos/video1.mp4" type="video/mp4">
    </video>
    <div class="caption">My Krabi experience 🎬</div>
  </div>
</div>

</body>
</html>
