<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Day 2 in Krabi</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <style>
    :root{
      --ocean:#4ecdc4;
      --deep:#1a8fbf;
      --sand:#fff3c4;
      --card-bg:rgba(255,255,255,0.85);
      --shadow:0 8px 20px rgba(0,0,0,0.12);
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(to bottom,var(--deep),var(--ocean) 40%,var(--sand));
    }

    .container{
      max-width:1100px;
      margin:30px auto;
      padding:20px;
      background:rgba(255,255,255,0.85);
      border-radius:16px;
      box-shadow:var(--shadow);
    }

    nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:15px;
    }

    nav a{
      text-decoration:none;
      padding:8px 12px;
      background:#fff;
      border-radius:8px;
      font-weight:bold;
      color:#035;
    }

    h1{margin-bottom:20px;}

    .primary{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .main-photo{
      flex:1 1 320px;
      max-width:500px;
      overflow:hidden;
      border-radius:12px;
      box-shadow:var(--shadow);
    }

    .main-photo img{
      width:100%;
      transition:0.3s;
    }

    .main-photo:hover img{
      transform:scale(1.1);
    }

    .caption{
      flex:1 1 200px;
      background:var(--card-bg);
      padding:12px;
      border-radius:10px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:12px;
      margin-bottom:20px;
    }

    .photo-card{
      border-radius:12px;
      overflow:hidden;
      background:var(--card-bg);
      box-shadow:var(--shadow);
      cursor:pointer;
    }

    .photo-card img{
      width:100%;
      height:180px;
      object-fit:cover;
      transition:0.3s ease;
    }

    .photo-card:hover img{
      transform:scale(1.1);
    }

    .videos{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:14px;
    }

    video{
      width:100%;
      border-radius:10px;
      box-shadow:var(--shadow);
    }

    .lightbox{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,0.7);
      visibility:hidden;
      opacity:0;
      transition:0.3s;
    }

    .lightbox.open{
      visibility:visible;
      opacity:1;
    }

    .lightbox img{
      max-width:95%;
      max-height:95%;
      border-radius:12px;
      transform:scale(0.8);
      transition:0.3s ease;
    }

    .lightbox.open img{
      transform:scale(1);
    }

    .close-btn{
      position:absolute;
      top:20px;
      right:20px;
      background:white;
      border:none;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- ✅ FIXED NAVBAR -->
  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="page2.html">Page 2</a>
    <a href="page3.html">Page 3</a>
    <a href="page4.html">Page 4</a> <!-- ✅ added -->
    <a href="page5.html">Page 5</a> <!-- ✅ added -->
  </nav>

  <h1>🏝️ Day 2 in Krabi</h1>

  <section class="primary">
    <div class="main-photo">
      <img src="beach1.jpg" id="featured">
    </div>

    <div class="caption" contenteditable="true">
      Amazing beach vibes 🌊 (click to edit)
    </div>
  </section>

  <section class="gallery">
    <div class="photo-card" data-src="beach1.jpg"><img src="beach1.jpg"></div>
    <div class="photo-card" data-src="beach2.jpg"><img src="beach2.jpg"></div>
    <div class="photo-card" data-src="beach3.jpg"><img src="beach3.jpg"></div>
    <div class="photo-card" data-src="beach4.jpg"><img src="beach4.jpg"></div>
    <div class="photo-card" data-src="beach5.jpg"><img src="beach5.jpg"></div>
    <div class="photo-card" data-src="beach6.jpg"><img src="beach6.jpg"></div>
    <div class="photo-card" data-src="beach7.jpg"><img src="beach7.jpg"></div>
    <div class="photo-card" data-src="beach8.jpg"><img src="beach8.jpg"></div>
  </section>

  <section class="videos">
    <video controls>
      <source src="beachvideo1.mp4" type="video/mp4">
    </video>

    <video controls>
      <source src="beachvideo2.mp4" type="video/mp4">
    </video>
  </section>

</div>

<div class="lightbox" id="lightbox">
  <button class="close-btn" onclick="closeBox()">Close ✕</button>
  <img id="lightImg">
</div>

<script>
  const cards = document.querySelectorAll('.photo-card');
  const lightbox = document.getElementById('lightbox');
  const lightImg = document.getElementById('lightImg');
  const featured = document.getElementById('featured');

  cards.forEach(card=>{
    card.addEventListener('click', ()=>{
      lightImg.src = card.dataset.src;
      lightbox.classList.add('open');
    });

    card.addEventListener('dblclick', ()=>{
      featured.src = card.dataset.src;
    });
  });

  function closeBox(){
    lightbox.classList.remove('open');
  }

  lightbox.addEventListener('click',(e)=>{
    if(e.target === lightbox) closeBox();
  });
</script>

</body>
</html>
